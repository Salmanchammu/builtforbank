services:
  - type: web
    name: smart-bank-v2
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn render_app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
    disk:
      name: smart-bank-data
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
