<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBank | Agri Buyer Portal</title>
    <link rel="stylesheet" href="css/premium-ui.css">
    <link rel="stylesheet" href="css/modern-auth.css">
    <link rel="stylesheet" href="css/face-auth-fixed.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Agri Green Theme Override -->
    <style>
        /* ============================================================
           GREEN THEME OVERRIDES
           ============================================================ */
        :root {
            --agri-primary: #166534;
            --agri-primary-hover: #15803d;
            --agri-primary-deep: #052e16;
            --agri-gold: #84cc16;
            --agri-primary-gradient: linear-gradient(135deg, #166534 0%, #22863a 100%);
        }

        /* Background */
        body {
            background: linear-gradient(135deg, #021a0a 0%, #0a3d1e 40%, #0d2f18 70%, #011208 100%) !important;
        }

        /* Orbs */
        body::before {
            background: radial-gradient(circle at center, rgba(22, 101, 52, 0.30) 0%, transparent 65%) !important;
        }
        body::after {
            background: radial-gradient(circle at center, rgba(132, 204, 22, 0.18) 0%, transparent 65%) !important;
        }

        /* Active Tab */
        .auth-tab.active {
            color: var(--agri-primary) !important;
            border-bottom-color: var(--agri-primary) !important;
        }

        /* Logo "BANKING" text -> green */
        .logo-icon .agri-accent {
            color: var(--agri-primary) !important;
        }

        /* Input focus */
        .input-wrapper input:focus {
            border-color: rgba(22, 101, 52, 0.5) !important;
            box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.09), 0 2px 6px rgba(0, 0, 0, 0.04) !important;
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--agri-primary) !important;
        }

        /* Checkbox checked */
        .checkbox-container input:checked {
            background: var(--agri-primary) !important;
            border-color: var(--agri-primary) !important;
        }

        /* Primary Button */
        .btn-primary {
            background-image: var(--agri-primary-gradient) !important;
            box-shadow: 0 6px 20px rgba(22, 101, 52, 0.35), 0 2px 6px rgba(0, 0, 0, 0.1) !important;
        }
        .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(22, 101, 52, 0.5), 0 4px 10px rgba(0, 0, 0, 0.15) !important;
        }

        /* Face Login => Agri Face Login */
        .btn-face-login {
            background-image: linear-gradient(135deg, #166534 0%, #052e16 100%) !important;
            box-shadow: 0 6px 20px rgba(22, 101, 52, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2) !important;
        }
        .btn-face-login:hover {
            box-shadow: 0 10px 30px rgba(22, 101, 52, 0.45) !important;
        }

        /* Isometric illustration accents */
        .iso-btn {
            background: var(--agri-primary-gradient) !important;
            box-shadow: 0 6px 18px rgba(22, 101, 52, 0.5) !important;
        }

        .iso-grid {
            background-image:
                linear-gradient(rgba(34, 134, 58, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 134, 58, 0.15) 1px, transparent 1px) !important;
        }

        /* Branding title accent */
        .branding-title span {
            color: var(--agri-gold) !important;
        }

        /* Additional links */
        .link-secondary:hover {
            color: var(--agri-primary) !important;
        }

        /* Error toast styling */
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #fecaca;
        }
        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #bbf7d0;
        }

        /* Signup form grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media(max-width: 520px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <a href="user.html" class="home-btn"><i class="fas fa-arrow-left"></i> Back to Bank</a>

        <!-- Left Side - Login Form -->
        <div class="auth-left">
            <div class="auth-card">

                <!-- Tabbed Header -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Register</button>
                </div>

                <div class="form-container">
                    <!-- Logo & Greeting -->
                    <div class="logo-section">
                        <div class="logo-icon">
                            <i class="fas fa-tractor" style="color: var(--agri-primary);"></i>
                            <span>SMART <span class="agri-accent" style="color: var(--agri-primary);">AGRI</span></span>
                        </div>
                        <h2 class="page-title">Agriculture Buyer Portal</h2>
                    </div>

                    <div id="errorMsg" class="error-msg"></div>
                    <div id="successMsg" class="success-msg"></div>

                    <!-- Login Form -->
                    <form id="loginForm" class="form-section active-form" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginId">Buyer ID / Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="loginId" placeholder="Enter your buyer ID" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="loginPassword" placeholder="••••••••••" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword')"
                                    style="position: absolute; right: 16px; color: #94a3b8; cursor: pointer;"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkbox-label">Remember me</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary" id="loginBtn">
                            Sign In
                        </button>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <button type="button" class="btn-face-login" onclick="testFaceLogin('agri_buyer')">
                            <span class="face-icon-box">
                                <div class="user-icon-simple"></div>
                            </span>
                            <span class="btn-text">Secure Face Login</span>
                        </button>
                    </form>

                    <!-- Signup Form -->
                    <form id="signupForm" class="form-section" onsubmit="handleSignup(event)">
                        <div class="grid-layout">
                            <div class="form-group">
                                <label for="regBuyerId">Buyer ID *</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-id-badge input-icon"></i>
                                    <input type="text" id="regBuyerId" placeholder="e.g. BUYER001" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="regName">Full Name *</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-user input-icon"></i>
                                    <input type="text" id="regName" placeholder="Your full name" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="regEmail">Email *</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="regEmail" placeholder="buyer@company.com" required>
                            </div>
                        </div>
                        <div class="grid-layout">
                            <div class="form-group">
                                <label for="regPhone">Phone</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-phone input-icon"></i>
                                    <input type="tel" id="regPhone" placeholder="9876543210">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="regPassword">Password *</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-lock input-icon"></i>
                                    <input type="password" id="regPassword" placeholder="Min 6 chars" required minlength="6">
                                </div>
                            </div>
                        </div>
                        <div class="grid-layout">
                            <div class="form-group">
                                <label for="regBusiness">Business Name</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-building input-icon"></i>
                                    <input type="text" id="regBusiness" placeholder="Your company">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="regGst">GST Number</label>
                                <div class="input-wrapper">
                                    <i class="fas fa-file-invoice input-icon"></i>
                                    <input type="text" id="regGst" placeholder="GST number">
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" id="signupBtn">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </form>

                    <div class="additional-links" style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
                        <a href="user.html" class="link-secondary"><i class="fas fa-landmark"></i> Bank Login</a>
                        <a href="staff.html" class="link-secondary"><i class="fas fa-user-tie"></i> Staff Portal</a>
                    </div>
                </div>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <i class="far fa-copyright"></i>
                <span>2026 Smart Bank Corporation</span>
            </div>
        </div>

        <!-- Right Side - Branding/Illustration -->
        <div class="auth-right">
            <div class="branding-content">
                <h1 class="branding-title">
                    Welcome to the<br>
                    <span>Agri Buyer Portal</span>
                </h1>

                <!-- CSS Isometric Illustration -->
                <div class="iso-illustration">
                    <!-- The Grid Floor -->
                    <div class="iso-grid"></div>

                    <!-- The Stand/Dashboard -->
                    <div class="iso-stand">
                        <div class="iso-logo">
                            <span style="color:var(--text-primary)">SMART</span> <span
                                style="color:#166534;">AGRI</span>
                        </div>
                        <div class="iso-profile"><i class="fas fa-tractor" style="font-size: 20px; color: #166534;"></i></div>
                        <div class="iso-login-dots"></div>
                        <div class="iso-btn"><i class="fas fa-arrow-right"></i></div>
                    </div>

                    <!-- Left Shield with Leaf -->
                    <div class="iso-shield">
                        <i class="fas fa-leaf" style="color: #22c55e;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast" id="toast"></div>

        <!-- Scripts -->
        <script src="js/premium-ui.js"></script>
        <script src="js/api-config.js"></script>
        <script src="js/face-api.min.js"></script>
        <script src="js/face-auth-fixed.js"></script>
        <script>
            function switchTab(tab) {
                document.querySelectorAll('.auth-tab').forEach((t, i) => {
                    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
                });
                document.getElementById('loginForm').classList.toggle('active-form', tab === 'login');
                document.getElementById('signupForm').classList.toggle('active-form', tab !== 'login');
                document.getElementById('errorMsg').style.display = 'none';
                document.getElementById('successMsg').style.display = 'none';
            }

            function togglePassword(id) {
                const input = document.getElementById(id);
                const icon = input.parentElement.querySelector('.toggle-password');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }

            function showError(msg) {
                const el = document.getElementById('errorMsg');
                el.textContent = msg; el.style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
            }
            function showSuccess(msg) {
                const el = document.getElementById('successMsg');
                el.textContent = msg; el.style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
            }

            async function handleLogin(e) {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
                try {
                    const r = await fetch(API + '/auth/buyer/login', {
                        method: 'POST', credentials: 'include',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            buyer_id: document.getElementById('loginId').value.trim(),
                            password: document.getElementById('loginPassword').value
                        })
                    });
                    const data = await r.json();
                    if (!r.ok) throw new Error(data.error || 'Login failed');
                    localStorage.setItem('agriBuyer', JSON.stringify(data.buyer));
                    sessionStorage.setItem('userRole', 'agri_buyer');
                    sessionStorage.setItem('userName', data.buyer.name);
                    window.location.href = 'agri-buyer-dash.html';
                } catch (err) {
                    showError(err.message);
                } finally {
                    btn.disabled = false; btn.innerHTML = 'Sign In';
                }
            }

            async function handleSignup(e) {
                e.preventDefault();
                const btn = document.getElementById('signupBtn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
                try {
                    const r = await fetch(API + '/auth/buyer/signup', {
                        method: 'POST', credentials: 'include',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            buyer_id: document.getElementById('regBuyerId').value.trim(),
                            name: document.getElementById('regName').value.trim(),
                            email: document.getElementById('regEmail').value.trim(),
                            phone: document.getElementById('regPhone').value.trim(),
                            password: document.getElementById('regPassword').value,
                            business_name: document.getElementById('regBusiness').value.trim(),
                            gst_number: document.getElementById('regGst').value.trim()
                        })
                    });
                    const data = await r.json();
                    if (!r.ok) throw new Error(data.error || 'Registration failed');
                    showSuccess(data.message);
                    setTimeout(() => switchTab('login'), 2000);
                } catch (err) {
                    showError(err.message);
                } finally {
                    btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                }
            }
        </script>
    </div>
</body>

</html>
