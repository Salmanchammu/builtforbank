<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bank - User Login</title>
    <link rel="stylesheet" href="css/premium-ui.css">
    <script src="js/premium-ui.js"></script>
    <!-- Modern Premium Authentication CSS -->
    <link rel="stylesheet" href="css/modern-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Device Detector -->
    <script src="js/device-detector.js" data-auto-redirect></script>
    <!-- Face Auth -->
    <link rel="stylesheet" href="css/face-auth-fixed.css">
</head>

<body>
    <div class="auth-layout">
        <a href="index.html" class="home-btn"><i class="fas fa-arrow-left"></i> Home</a>
        <!-- Left Side - Login Form -->
        <div class="auth-left">
            <div class="auth-card">

                <!-- Tabbed Header -->
                <div class="auth-tabs">
                    <a href="user.html" class="auth-tab active">Sign In</a>
                    <a href="signup.html" class="auth-tab">Sign Up</a>
                    <a href="forgot-password.html" class="auth-tab">Recovery</a>
                </div>

                <div class="form-container">
                    <!-- Logo & Greeting -->
                    <div class="logo-section">
                        <div class="logo-icon">
                            <i class="fas fa-landmark" style="margin-right: 10px; vertical-align: middle;"></i>
                            <span style="color: var(--text-primary);">SMART</span> <span
                                style="color: #8E2020;">BANKING</span>
                        </div>
                        <h2 class="page-title">Smart Bank Login</h2>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="form-section active-form">
                        <div class="form-group">
                            <label for="email">Login / Username</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="email" name="email" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" name="password" placeholder="••••••••••" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"
                                    style="position: absolute; right: 16px; color: #94a3b8; cursor: pointer;"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkbox-label">Remember me</span>
                            </label>
                        </div>

                        

                        <button type="submit" class="btn-primary">
                            Sign In
                        </button>

                        <div class="divider" style="margin: 15px 0;">
                            <span>OR</span>
                        </div>

                        <button type="button" class="btn-face-login" onclick="testFaceLogin('user')">
                            <span class="face-icon-box">
                                <div class="user-icon-simple"></div>
                            </span>
                            <span class="btn-text">Secure Face Login</span>
                        </button>
                    </form>

                    <div class="additional-links" style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
                        <a href="staff.html" class="link-secondary"><i class="fas fa-user-tie"></i> Staff Portal</a>
                        <a href="agri-buyer-login.html" class="link-secondary" style="color:#10b981"><i class="fas fa-leaf"></i> Retail Agri Login</a>
                    </div>
                </div>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <i class="far fa-copyright"></i>
                <span>2026 Smart Bank Corporation</span>
            </div>

        </div>

        <!-- Right Side - Branding/Illustration -->
        <div class="auth-right">
            <div class="branding-content">
                <h1 class="branding-title">
                    Welcome to the Smart Bank<br>
                    <span>Smart Banking</span>
                </h1>

                <!-- CSS Isometric Illustration -->
                <div class="iso-illustration">
                    <!-- The Grid Floor -->
                    <div class="iso-grid"></div>

                    <!-- The Stand/Dashboard -->
                    <div class="iso-stand">
                        <div class="iso-logo">
                            <span style="color:var(--text-primary)">SMART</span> <span
                                style="color:#8E2020;">BANKING</span>
                        </div>
                        <div class="iso-profile"><i class="far fa-user"></i></div>
                        <div class="iso-login-dots"></div>
                        <div class="iso-btn"><i class="fas fa-arrow-right"></i></div>
                    </div>

                    <!-- Left Shield -->
                    <div class="iso-shield">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- OTP Verification Modal (2FA Login) -->
        <div id="loginOtpModal" class="modal">
            <div class="modal-content auth-card otp-glass">
                <div class="modal-header">
                    <div class="otp-icon-lpc">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <h2 class="auth-title">2-Step Verification</h2>
                    <p class="auth-subtitle">For your security, please enter the verification codes sent to your email and phone.</p>
                </div>

                <form id="loginOtpForm" class="otp-form-premium" style="display: flex; flex-direction: column; gap: 15px;">
                    <input type="hidden" id="loginUsername">
                    <input type="hidden" id="loginRole" value="user">
                    
                    <div class="otp-input-container" style="margin-bottom: 0;">
                        <label for="loginEmailOtp" style="font-size: 0.85rem; color: var(--text-secondary); align-self: flex-start; margin-bottom: 5px; display: block;">Email Code</label>
                        <input type="text" id="loginEmailOtp" class="otp-field-main" placeholder="------" maxlength="6"
                            autocomplete="off" required autofocus>
                        <div class="otp-input-underline"></div>
                    </div>

                    <div class="otp-input-container" style="margin-bottom: 0;">
                        <label for="loginPhoneOtp" style="font-size: 0.85rem; color: var(--text-secondary); align-self: flex-start; margin-bottom: 5px; display: block;">SMS Code</label>
                        <input type="text" id="loginPhoneOtp" class="otp-field-main" placeholder="------" maxlength="6"
                            autocomplete="off" required>
                        <div class="otp-input-underline"></div>
                    </div>

                    <button type="submit" class="btn-primary btn-glossy" id="loginVerifyBtn">
                        <span>SECURE LOGIN</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <button type="button" class="btn-secondary" style="margin-top: 10px;" onclick="document.getElementById('loginOtpModal').classList.remove('show'); document.getElementById('loginForm').style.display='block';">
                        Cancel
                    </button>
                </form>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast" id="toast"></div>

        <!-- Scripts -->
        <script src="js/auth-helper.js"></script>
        <script src="js/api-config.js"></script>
        <script src="js/user-auth.js"></script>
        <script src="js/face-auth-fixed.js"></script>
        <script>
            function togglePassword(id) {
                const input = document.getElementById(id);
                const icon = input.parentElement.querySelector('.toggle-password');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }
        </script>
    </div>

    <!-- Language Switcher -->
    <script src="js/language-switcher.js"></script>
</body>

</html>
