<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bank - User Login</title>
    <!-- Modern Premium Authentication CSS -->
    <link rel="stylesheet" href="modern-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-layout">
        <a href="index.html" class="home-btn"><i class="fas fa-arrow-left"></i> Home</a>
        <!-- Left Side - Login Form -->
        <div class="auth-left">
            <div class="auth-card">

                <!-- Tabbed Header -->
                <div class="auth-tabs">
                    <a href="user.html" class="auth-tab active">Sign In</a>
                    <a href="signup.html" class="auth-tab">Sign Up</a>
                    <a href="forgot-password.html" class="auth-tab">Password recovery</a>
                </div>

                <div class="form-container">
                    <!-- Logo & Greeting -->
                    <div class="logo-section">
                        <div class="logo-icon">
                            <span style="color: var(--text-primary);">SMART</span> <span
                                style="color: #8E2020;">BANKING</span>
                        </div>
                        <h2 class="page-title">Smart Bank Login</h2>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="form-section active-form">
                        <div class="form-group">
                            <label for="email">Login / Username</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="email" name="email" placeholder="Enter your username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" name="password" placeholder="••••••••••" required>
                                <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"
                                    style="position: absolute; right: 16px; color: #94a3b8; cursor: pointer;"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkbox-label">Remember me</span>
                            </label>
                        </div>

                        <!-- Interactive reCAPTCHA Mock -->
                        <div class="recaptcha-mock"></div>

                        <button type="submit" class="btn-primary">
                            Sign In
                        </button>
                    </form>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="additional-links">
                        <a href="staff.html" class="link-secondary"><i class="fas fa-user-tie"></i> Staff Portal</a>
                    </div>
                </div>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <i class="far fa-copyright"></i>
                <span>2026 Smart Bank Corporation</span>
            </div>

        </div>

        <!-- Right Side - Branding/Illustration -->
        <div class="auth-right">
            <div class="branding-content">
                <h1 class="branding-title">
                    Welcome to the Smart Bank<br>
                    <span>Smart Banking</span>
                </h1>

                <!-- CSS Isometric Illustration -->
                <div class="iso-illustration">
                    <!-- The Grid Floor -->
                    <div class="iso-grid"></div>

                    <!-- The Stand/Dashboard -->
                    <div class="iso-stand">
                        <div class="iso-logo">
                            <span style="color:var(--text-primary)">SMART</span> <span
                                style="color:#8E2020;">BANKING</span>
                        </div>
                        <div class="iso-profile"><i class="far fa-user"></i></div>
                        <div class="iso-login-dots"></div>
                        <div class="iso-btn"><i class="fas fa-arrow-right"></i></div>
                    </div>

                    <!-- Left Shield -->
                    <div class="iso-shield">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast" id="toast"></div>

        <!-- Scripts -->
        <script src="device-detector.js"></script>
        <script src="auth-helper.js"></script>
        <script src="api-config.js"></script>
        <script src="user-auth.js"></script>
        <script>
            function togglePassword(id) {
                const input = document.getElementById(id);
                const icon = input.parentElement.querySelector('.toggle-password');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            }
        </script>
    </div>
    <script src="api-config.js"></script>
</body>

</html>
