<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBank | Mobile Signup</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
    <!-- Device Detector -->
    <script src="device-detector.js" data-auto-redirect></script>
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content active">
            <div class="auth-logo" style="background: linear-gradient(135deg, var(--primary-maroon), #2a0000); box-shadow: 0 10px 25px rgba(74, 0, 0, 0.2);">
                <i class="fas fa-user-plus"></i>
            </div>

            <h1 class="welcome-title" style="font-size: 30px; letter-spacing: -1px; margin-bottom: 8px;">Join Us<span style="color: var(--accent-gold);">.</span></h1>
            <p style="color: var(--text-grey); font-weight: 500; font-size: 15px; margin-bottom: 30px;">Start your premium banking journey</p>

            <form id="mobileSignupForm" onsubmit="handleMobileSignup(event)">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="signupName" class="form-input" placeholder="e.g. Salman Shad" required style="border-radius: 16px; padding: 15px; background: white;">
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="name@example.com" required style="border-radius: 16px; padding: 15px; background: white;">
                </div>

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="signupUsername" class="form-input" placeholder="choose a username" required style="border-radius: 16px; padding: 15px; background: white;">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required style="border-radius: 16px; padding: 15px; background: white;">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" class="form-input" placeholder="••••••••"
                        required style="border-radius: 16px; padding: 15px; background: white;">
                </div>

                <div class="form-group" style="display: flex; gap: 12px; align-items: center; margin-bottom: 25px;">
                    <input type="checkbox" id="agreeTerms" required
                        style="width: 20px; height: 20px; accent-color: var(--primary-maroon); border-radius: 6px;">
                    <label class="form-label" style="margin-bottom: 0; font-size: 13px;">I agree to the <a href="#"
                            style="color: var(--primary-maroon); font-weight: 700;">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-primary-maroon" style="border-radius: 16px; padding: 16px; font-size: 16px; box-shadow: 0 8px 20px rgba(74, 0, 0, 0.2);">
                    Create Account
                </button>
            </form>

            <div class="auth-links" style="margin-top: 20px; position: relative; z-index: 3500; pointer-events: auto;">
                <a href="mobile-auth.html">Already have an account? <span style="color: var(--primary-maroon);">Login</span></a>
            </div>
        </div>

        <!-- OTP Verification Modal -->
        <div id="otpModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 5000;">
            <div class="modal-content" style="text-align: center; padding: 40px 24px; border-radius: 32px; width: 90%; max-width: 400px; position: relative; overflow: visible;">
                <!-- Maroon Shield Icon -->
                <div style="width: 80px; height: 80px; background: #600; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -80px auto 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 4px solid #fff;">
                    <i class="fas fa-shield-alt" style="color: white; font-size: 32px;"></i>
                </div>

                <h2 style="margin: 0 0 10px; font-size: 24px; font-weight: 800; color: #000;">Verify Account</h2>
                <p style="margin: 0 0 30px; font-size: 15px; color: #333; line-height: 1.4; padding: 0 10px;">A verification code has been sent to your email. Please check your inbox.</p>

                <!-- OTP Input Group -->
                <div class="otp-inputs" style="display: flex; gap: 8px; justify-content: center; margin-bottom: 35px;">
                    <input type="text" maxlength="1" class="otp-field" id="otp_1" onkeyup="moveOtpFocus(this, 'otp_2')" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none; border-radius: 0;">
                    <input type="text" maxlength="1" class="otp-field" id="otp_2" onkeyup="moveOtpFocus(this, 'otp_3')" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none;">
                    <input type="text" maxlength="1" class="otp-field" id="otp_3" onkeyup="moveOtpFocus(this, 'otp_4')" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none;">
                    <div style="width: 2px; height: 30px; background: #900; margin-top: 10px;"></div>
                    <input type="text" maxlength="1" class="otp-field" id="otp_4" onkeyup="moveOtpFocus(this, 'otp_5')" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none;">
                    <input type="text" maxlength="1" class="otp-field" id="otp_5" onkeyup="moveOtpFocus(this, 'otp_6')" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none;">
                    <input type="text" maxlength="1" class="otp-field" id="otp_6" style="width: 45px; height: 50px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2px solid #ccc; background: transparent; outline: none;">
                </div>

                <button id="btnVerifyOtp" onclick="handleMobileVerifyOtp()" class="btn-primary-maroon" style="width: 100%; border-radius: 20px; padding: 18px; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(to right, #a00, #c33);">
                    CONFIRM & ACTIVATE <i class="fas fa-arrow-right"></i>
                </button>

                <p style="margin-top: 25px; font-size: 14px; color: #666;">
                    Didn't receive the code? <a href="javascript:void(0)" onclick="handleMobileResendOtp()" style="color: #900; font-weight: 700; text-decoration: none;">Resend Code</a>
                </p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="mobile-auth.html" class="nav-item">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
</body>

</html>
