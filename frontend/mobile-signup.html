<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SmartBank - Create your secure banking account. Start your smart banking journey today.">
    <title>SmartBank | Create Account</title>
    <link rel="stylesheet" href="css/premium-ui.css">
    <script src="js/premium-ui.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/chatbot.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/mobile-modern.css">
    <!-- Device Detector -->
    <script src="js/device-detector.js" data-auto-redirect></script>
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container-modern page-content active" style="overflow-y: auto;">

            <!-- Animated Logo -->
            <div class="auth-logo-modern" style="background: linear-gradient(145deg, #3a0a00, #2a0000);">
                <i class="fas fa-user-plus" style="color: #d4af37;"></i>
            </div>

            <!-- Title -->
            <h1 class="auth-title-modern">Join Us<span class="dot-accent">.</span></h1>
            <p class="auth-subtitle-modern">Start your smart banking journey</p>

            <!-- Signup Form -->
            <form id="mobileSignupForm" onsubmit="handleMobileSignup(event)">
                <div class="form-group-modern" style="animation-delay: 0.3s;">
                    <label class="form-label-modern" for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-input-modern" placeholder="e.g. Salman Shad" required autocomplete="name">
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="animation-delay: 0.35s;">
                    <label class="form-label-modern" for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-input-modern" placeholder="name@example.com" required autocomplete="email">
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="animation-delay: 0.38s;">
                    <label class="form-label-modern" for="signupPhone">Phone Number</label>
                    <input type="tel" id="signupPhone" class="form-input-modern" placeholder="+91 9876543210" required autocomplete="tel">
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="animation-delay: 0.4s;">
                    <label class="form-label-modern" for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" class="form-input-modern" placeholder="Choose a username" required autocomplete="username">
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="animation-delay: 0.45s;">
                    <label class="form-label-modern" for="signupPassword">Password</label>
                    <div class="password-wrapper-modern">
                        <input type="password" id="signupPassword" class="form-input-modern" placeholder="••••••••" required autocomplete="new-password">
                        <i class="fas fa-eye-slash password-toggle-modern" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'; this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');"></i>
                    </div>
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="animation-delay: 0.5s;">
                    <label class="form-label-modern" for="signupConfirmPassword">Confirm Password</label>
                    <div class="password-wrapper-modern">
                        <input type="password" id="signupConfirmPassword" class="form-input-modern" placeholder="••••••••" required autocomplete="new-password">
                        <i class="fas fa-eye-slash password-toggle-modern" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'; this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');"></i>
                    </div>
                    <div class="input-glow"></div>
                </div>

                <div class="form-group-modern" style="display: flex; gap: 12px; align-items: center; margin-bottom: 24px; animation-delay: 0.55s;">
                    <input type="checkbox" id="agreeTerms" required
                        style="width: 22px; height: 22px; accent-color: var(--primary-maroon); border-radius: 6px; flex-shrink: 0;">
                    <label class="form-label-modern" for="agreeTerms" style="margin-bottom: 0; font-size: 13px; text-transform: none; letter-spacing: 0;">I agree to the <a href="#"
                            style="color: var(--primary-maroon); font-weight: 700; text-decoration: none;">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="btn-login-modern" style="animation-delay: 0.6s;">
                    <span class="btn-text"><i class="fas fa-rocket" style="font-size: 14px;"></i> Create Account</span>
                </button>
            </form>

            <!-- Auth Links -->
            <div class="auth-links-modern" style="justify-content: center;">
                <a href="mobile-auth.html">Already have an account? <span style="color: var(--primary-maroon); font-weight: 800;">Login</span></a>
            </div>

            <!-- Security Badge -->
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Your data is encrypted and secure</span>
            </div>
        </div>

        <!-- OTP Verification Modal -->
        <div id="otpModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 5000;">
            <div class="modal-content" style="text-align: center; padding: 40px 24px; border-radius: 32px; width: 90%; max-width: 400px; position: relative; overflow: visible;">
                <!-- Maroon Shield Icon -->
                <div style="width: 80px; height: 80px; background: linear-gradient(145deg, #5a0000, #3a0000); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -80px auto 25px; box-shadow: 0 10px 30px rgba(74,0,0,0.25); border: 4px solid #fff;">
                    <i class="fas fa-shield-alt" style="color: #d4af37; font-size: 32px;"></i>
                </div>

                <h2 style="margin: 0 0 10px; font-size: 24px; font-weight: 800; color: #000;">Account Verification</h2>
                <p style="margin: 0 0 30px; font-size: 15px; color: #555; line-height: 1.5; padding: 0 10px;">A verification code has been sent to your email.</p>

                <!-- Email OTP Input -->
                <div style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 35px;">
                    <div>
                        <label style="display: block; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 8px; text-align: left; padding-left: 5px;">Email Code</label>
                        <input type="text" id="email_otp" class="otp-field-main" placeholder="------" maxlength="6" 
                            style="width: 100%; height: 55px; text-align: center; font-size: 24px; font-weight: 700; border: none; border-bottom: 2.5px solid #ddd; background: #f9f9f9; outline: none; border-radius: 12px; transition: border-color 0.3s;">
                    </div>
                </div>

                <button id="btnVerifyOtp" onclick="handleMobileVerifyOtp()" class="btn-login-modern" style="width: 100; border-radius: 18px; padding: 18px; font-size: 15px;">
                    <span class="btn-text">CONFIRM & ACTIVATE <i class="fas fa-arrow-right"></i></span>
                </button>

                <p style="margin-top: 25px; font-size: 14px; color: #888;">
                    Didn't receive the code? <a href="javascript:void(0)" onclick="handleMobileResendOtp()" style="color: var(--primary-maroon); font-weight: 700; text-decoration: none;">Resend Code</a>
                </p>
            </div>
        </div>

        <!-- Modern Bottom Navigation -->
        <nav class="bottom-nav-modern">
            <a href="mobile-auth.html" class="nav-item-modern">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center-modern">
                <div class="nav-center-btn-modern" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item-modern" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/api-config.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/mobile-logic.js"></script>
    <!-- Language Switcher -->
    <script src="js/language-switcher.js"></script>
</body>

</html>
