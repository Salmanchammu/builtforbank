<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SmartBank - Reset your password securely.">
    <title>SmartBank | Reset Password</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/chatbot.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/mobile-modern.css">
    <!-- Device Detector -->
    <script src="js/device-detector.js" data-auto-redirect></script>
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container-modern page-content active" style="overflow-y: auto;">

            <!-- Animated Logo -->
            <div class="auth-logo-modern" style="background: linear-gradient(145deg, #3a0a00, #2a0000);">
                <i class="fas fa-key" style="color: #d4af37;"></i>
            </div>

            <!-- Title -->
            <h1 class="auth-title-modern">Forgot<span class="dot-accent">?</span></h1>
            <p class="auth-subtitle-modern">Reset your password securely</p>

            <!-- Form -->
            <form id="mobileForgotForm" onsubmit="handleMobileForgot(event)">
                <div class="form-group-modern" style="animation-delay: 0.3s;">
                    <label class="form-label-modern" for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-input-modern" placeholder="e.g. name@example.com" required autocomplete="email">
                    <div class="input-glow"></div>
                </div>

                <!-- Info Card -->
                <div style="background: linear-gradient(135deg, #fffbf0, #fff7ed); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 18px; padding: 18px 20px; margin-bottom: 28px; font-size: 13px; color: #92400e; line-height: 1.6; text-align: left; display: flex; gap: 14px; align-items: flex-start; animation: contentSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;">
                    <div style="width: 36px; height: 36px; min-width: 36px; background: rgba(212, 175, 55, 0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-envelope" style="color: #d4af37; font-size: 15px;"></i>
                    </div>
                    <span>A secure reset link will be sent to your registered email. Please check your inbox and spam folder.</span>
                </div>

                <button type="submit" class="btn-login-modern" style="animation-delay: 0.5s;">
                    <span class="btn-text"><i class="fas fa-paper-plane" style="font-size: 14px;"></i> Send Reset Link</span>
                </button>
            </form>

            <!-- Back Link -->
            <div class="auth-links-modern" style="justify-content: center; margin-top: 28px;">
                <a href="mobile-auth.html" style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-arrow-left" style="font-size: 12px;"></i> Back to Login
                </a>
            </div>

            <!-- Security Badge -->
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>256-bit SSL Encrypted</span>
            </div>
        </div>

        <!-- Modern Bottom Navigation -->
        <nav class="bottom-nav-modern">
            <a href="mobile-auth.html" class="nav-item-modern">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center-modern">
                <div class="nav-center-btn-modern" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item-modern" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/api-config.js"></script>
    <script src="js/chatbot.js"></script>
    <script src="js/mobile-logic.js"></script>
    <!-- Language Switcher -->
    <script src="js/language-switcher.js"></script>
</body>

</html>
