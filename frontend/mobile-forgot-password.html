<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBank | Forgot Password</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
    <!-- Device Detector -->
    <script src="device-detector.js" data-auto-redirect></script>
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content active">
            <div class="auth-logo" style="background: linear-gradient(135deg, var(--primary-maroon), #2a0000); box-shadow: 0 10px 25px rgba(74, 0, 0, 0.2);">
                <i class="fas fa-key"></i>
            </div>

            <h1 class="welcome-title" style="font-size: 32px; letter-spacing: -1px; margin-bottom: 8px;">Forgot<span style="color: var(--accent-gold);">.</span></h1>
            <p style="color: var(--text-grey); font-weight: 500; font-size: 15px; margin-bottom: 30px;">Reset your password securely</p>

            <form id="mobileForgotForm" onsubmit="handleMobileForgot(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-input" placeholder="e.g. name@example.com" required style="border-radius: 16px; padding: 16px; background: white;">
                </div>

                <div style="background: #fff7ed; border: 1px solid #fed7aa; border-radius: 16px; padding: 18px; margin-bottom: 30px; font-size: 13px; color: #9a3412; line-height: 1.5; text-align: left; display: flex; gap: 12px; align-items: flex-start;">
                    <i class="fas fa-info-circle" style="margin-top: 2px;"></i>
                    <span>A secure reset link will be sent to your registered email. Please check your inbox.</span>
                </div>

                <button type="submit" class="btn-primary-maroon" style="border-radius: 16px; padding: 18px; font-size: 16px; box-shadow: 0 8px 20px rgba(74, 0, 0, 0.2);">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-links" style="margin-top: 20px; position: relative; z-index: 3500; pointer-events: auto;">
                <a href="mobile-auth.html" style="font-weight: 600;"><i class="fas fa-arrow-left" style="margin-right: 8px; font-size: 12px;"></i> Back to Login</a>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="mobile-auth.html" class="nav-item">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login/signup to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
</body>

</html>
