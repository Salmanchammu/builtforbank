<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bank - Forgot Password</title>
    <!-- Modern Premium Authentication CSS -->
    <link rel="stylesheet" href="modern-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-layout">
        <a href="index.html" class="home-btn"><i class="fas fa-arrow-left"></i> Home</a>
        <!-- Left Side - Forgot Password Form -->
        <div class="auth-left">
            <div class="auth-card">

                <!-- Tabbed Header -->
                <div class="auth-tabs">
                    <a href="user.html" class="auth-tab">Sign In</a>
                    <a href="signup.html" class="auth-tab">Sign Up</a>
                    <a href="forgot-password.html" class="auth-tab active">Password recovery</a>
                </div>

                <div class="form-container">
                    <!-- Logo & Greeting -->
                    <div class="logo-section" style="margin-bottom: 15px;">
                        <div class="logo-icon">
                            <span style="color: var(--text-primary);">SMART</span> <span
                                style="color: #8E2020;">BANKING</span>
                        </div>
                        <h2 class="page-title">Password recovery</h2>
                    </div>

                    <!-- Alert Box -->
                    <div id="alertBox" class="alert" style="display: none;"></div>

                    <!-- Forgot Password Form -->
                    <form id="forgotPasswordForm" class="form-section active-form">
                        <div class="form-group">
                            <label for="email">Login / Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required
                                    autocomplete="email">
                            </div>
                        </div>

                        <!-- Interactive reCAPTCHA Mock -->
                        <div class="recaptcha-mock" id="recaptchaContainer"></div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="agreeTrade" required>
                                <span class="checkbox-label" style="font-size: 11px;">I agree to SmartBank <a href="#"
                                        class="link-primary">Terms of use</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">
                            Recover
                        </button>
                    </form>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="additional-links">
                        <a href="staff.html" class="link-secondary"><i class="fas fa-user-tie"></i> Staff Portal</a>
                    </div>
                </div>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <i class="far fa-copyright"></i>
                <span>2026 Smart Bank Corporation</span>
            </div>

        </div>

        <!-- Right Side - Branding/Illustration -->
        <div class="auth-right">
            <div class="branding-content">
                <h1 class="branding-title">
                    Welcome to the Smart Bank<br>
                    <span>Smart Banking</span>
                </h1>

                <!-- CSS Isometric Illustration -->
                <div class="iso-illustration">
                    <!-- The Grid Floor -->
                    <div class="iso-grid"></div>

                    <!-- The Stand/Dashboard -->
                    <div class="iso-stand">
                        <div class="iso-logo">
                            <span style="color:var(--text-primary)">SMART</span> <span
                                style="color:#8E2020;">BANKING</span>
                        </div>
                        <div class="iso-profile"><i class="far fa-user"></i></div>
                        <div class="iso-login-dots"></div>
                        <div class="iso-btn"><i class="fas fa-arrow-right"></i></div>
                    </div>

                    <!-- Left Shield -->
                    <div class="iso-shield">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast" id="toast"></div>

    <style>
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #16a34a;
        }

        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
        }

        .alert i {
            margin-right: 8px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Scripts -->
    <script src="auth-helper.js"></script>
    <script src="api-config.js"></script>
    <script>
        window.API = window.SMART_BANK_API_BASE || '/api';
        const form = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const emailInput = document.getElementById('email');
        const toastEl = document.getElementById('toast');

        function showAlert(message, type) {
            alertBox.className = `alert alert-${type}`;
            let icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            alertBox.innerHTML = icon + message;
            alertBox.style.display = 'block';
        }

        function showToast(message, type) {
            toastEl.textContent = message;
            toastEl.className = `toast toast-${type} show`;
            setTimeout(() => { toastEl.className = 'toast'; }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';

            const email = emailInput.value.trim();
            if (!email) {
                showAlert('Please enter your email address.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Sending...';

            try {
                const response = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Success! Check your email for the reset link.', 'success');
                    showToast('Reset email sent!', 'success');
                    emailInput.value = '';
                } else {
                    showAlert(data.error || 'Something went wrong. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Connection error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Recover';
            }
        });
    </script>
    <script src="api-config.js"></script>
</body>

</html>
