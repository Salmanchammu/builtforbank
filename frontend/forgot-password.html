<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bank - Forgot Password</title>
    <!-- Modern Premium Authentication CSS -->
    <link rel="stylesheet" href="css/modern-auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Device Detector -->
    <script src="js/device-detector.js?v=2.1" data-auto-redirect></script>
    <link rel="stylesheet" href="css/modern-auth.css?v=2.1">
</head>

<body>
    <div class="auth-layout">
        <a href="index.html" class="home-btn"><i class="fas fa-arrow-left"></i> Home</a>
        <!-- Left Side - Forgot Password Form -->
        <div class="auth-left">
            <div class="auth-card">

                <!-- Tabbed Header -->
                <div class="auth-tabs">
                    <a href="user.html" class="auth-tab">Sign In</a>
                    <a href="signup.html" class="auth-tab">Sign Up</a>
                    <a href="forgot-password.html" class="auth-tab active">Recovery</a>
                </div>

                <div class="form-container">
                    <!-- Logo & Greeting -->
                    <div class="logo-section" style="margin-bottom: 15px;">
                        <div class="logo-icon">
                            <span style="color: var(--text-primary);">SMART</span> <span
                                style="color: #8E2020;">BANKING</span>
                        </div>
                        <h2 class="page-title" id="pageTitle">Password recovery</h2>
                    </div>

                    <!-- Option Switcher (Premium Pill Style) -->
                    <div class="recovery-switcher-wrapper">
                        <div class="recovery-slider"></div>
                        <button type="button" id="switchPassword" class="switcher-btn active">Password</button>
                        <button type="button" id="switchUsername" class="switcher-btn">Username</button>
                    </div>

                    <style>
                        .recovery-switcher-wrapper {
                            position: relative;
                            display: flex;
                            background: #f1f5f9;
                            padding: 4px;
                            border-radius: 12px;
                            margin-bottom: 25px;
                            border: 1px solid #e2e8f0;
                        }
                        .recovery-slider {
                            position: absolute;
                            top: 4px;
                            left: 4px;
                            width: calc(50% - 4px);
                            height: calc(100% - 8px);
                            background: #8E2020;
                            border-radius: 10px;
                            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
                        }
                        .switcher-btn {
                            position: relative;
                            flex: 1;
                            padding: 10px;
                            border: none;
                            background: transparent;
                            cursor: pointer;
                            font-size: 13px;
                            font-weight: 600;
                            color: #64748b;
                            transition: color 0.3s ease;
                            z-index: 1;
                        }
                        .switcher-btn.active {
                            color: #ffffff;
                        }
                        .switcher-btn:not(.active):hover {
                            color: #475569;
                        }
                    </style>

                    <!-- Alert Box -->
                    <div id="alertBox" class="alert" style="display: none;"></div>

                    <!-- Forgot Password Form -->
                    <form id="forgotPasswordForm" class="form-section active-form">
                        <div class="form-group">
                            <label for="email">Login / Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope input-icon"></i>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required
                                    autocomplete="email">
                            </div>
                        </div>

                        

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" id="agreeTrade" required>
                                <span class="checkbox-label" style="font-size: 11px;">I agree to SmartBank <a href="#"
                                        class="link-primary">Terms of use</a></span>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitText">Recover Password</span>
                        </button>
                    </form>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="additional-links" style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
                        <a href="staff.html" class="link-secondary"><i class="fas fa-user-tie"></i> Staff Portal</a>
                        <a href="agri-buyer-login.html" class="link-secondary" style="color:#10b981"><i class="fas fa-leaf"></i> Retail Agri Login</a>
                    </div>
                </div>
            </div>

            <!-- Copyright -->
            <div class="copyright">
                <i class="far fa-copyright"></i>
                <span>2026 Smart Bank Corporation</span>
            </div>

        </div>

        <!-- Right Side - Branding/Illustration -->
        <div class="auth-right">
            <div class="branding-content">
                <h1 class="branding-title">
                    Welcome to the Smart Bank<br>
                    <span>Smart Banking</span>
                </h1>

                <!-- CSS Isometric Illustration -->
                <div class="iso-illustration">
                    <!-- The Grid Floor -->
                    <div class="iso-grid"></div>

                    <!-- The Stand/Dashboard -->
                    <div class="iso-stand">
                        <div class="iso-logo">
                            <span style="color:var(--text-primary)">SMART</span> <span
                                style="color:#8E2020;">BANKING</span>
                        </div>
                        <div class="iso-profile"><i class="far fa-user"></i></div>
                        <div class="iso-login-dots"></div>
                        <div class="iso-btn"><i class="fas fa-arrow-right"></i></div>
                    </div>

                    <!-- Left Shield -->
                    <div class="iso-shield">
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast" id="toast"></div>

    <style>
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-left: 4px solid #16a34a;
        }

        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
        }

        .alert i {
            margin-right: 8px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Scripts -->
    <script src="js/auth-helper.js?v=2.1"></script>
    <script src="js/api-config.js?v=2.1"></script>
    <script>
        let currentMode = 'password';

        const slider = document.querySelector('.recovery-slider');

        document.getElementById('switchPassword').addEventListener('click', () => {
            currentMode = 'password';
            document.getElementById('pageTitle').textContent = 'Password recovery';
            document.getElementById('submitText').textContent = 'Recover Password';
            document.getElementById('switchPassword').classList.add('active');
            document.getElementById('switchUsername').classList.remove('active');
            slider.style.transform = 'translateX(0)';
        });

        document.getElementById('switchUsername').addEventListener('click', () => {
            currentMode = 'username';
            document.getElementById('pageTitle').textContent = 'Username recovery';
            document.getElementById('submitText').textContent = 'Recover Username';
            document.getElementById('switchUsername').classList.add('active');
            document.getElementById('switchPassword').classList.remove('active');
            slider.style.transform = 'translateX(100%)';
        });

        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const toastEl = document.getElementById('toast');

        function showToast(message, type = 'success') {
            if (!toastEl) return;
            toastEl.textContent = message;
            toastEl.className = `toast show ${type}`;
            setTimeout(() => { toastEl.classList.remove('show'); }, 3000);
        }

        // Set initial state
        document.getElementById('switchPassword').click();

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.style.display = 'block';
            alertBox.className = `alert alert-${type}`;
            setTimeout(() => { alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';

            const email = emailInput.value.trim();
            if (!email) {
                showAlert('Please enter your email address.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span>Sending...';

            const endpoint = currentMode === 'password' ? '/auth/forgot-password' : '/auth/forgot-username';

            try {
                const response = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    const successMsg = currentMode === 'password' 
                        ? 'Success! Check your email for the reset link.' 
                        : 'Success! Your username has been sent to your email.';
                    showAlert(successMsg, 'success');
                    showToast('Email sent!', 'success');
                    emailInput.value = '';
                } else {
                    showAlert(data.error || 'Something went wrong. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Connection error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span id="submitText">Recover ${currentMode === 'password' ? 'Password' : 'Username'}</span>`;
            }
        });
    </script>
    <!-- Language Switcher -->
    <script src="js/language-switcher.js?v=2.1"></script>
</body>

</html>
