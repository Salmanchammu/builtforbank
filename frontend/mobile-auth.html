<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192x192.png">
    <title>SmartBank | Mobile Login</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chatbot.css">
    <link rel="stylesheet" href="mobile.css">
    <!-- Device Detector -->
    <script src="device-detector.js" data-auto-redirect></script>
</head>

<body>
    <div class="mobile-wrapper">
        <div class="auth-container page-content active">
            <div class="auth-logo" style="background: linear-gradient(135deg, var(--primary-maroon), #2a0000); box-shadow: 0 10px 25px rgba(74, 0, 0, 0.2);">
                <i class="fas fa-landmark"></i>
            </div>

            <h1 class="welcome-title" style="font-size: 32px; letter-spacing: -1px; margin-bottom: 8px;">Welcome<span style="color: var(--accent-gold);">.</span></h1>
            <p style="color: var(--text-grey); font-weight: 500; font-size: 15px; margin-bottom: 40px;">Secure Access to Premium Banking</p>

            <form id="mobileLoginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username / Customer ID</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required style="border-radius: 16px; padding: 16px; border: 1px solid var(--border-color); background: white;">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required style="border-radius: 16px; padding: 16px; border: 1px solid var(--border-color); background: white;">
                </div>

                <button type="submit" class="btn-primary-maroon" style="border-radius: 16px; padding: 18px; font-size: 17px; box-shadow: 0 8px 20px rgba(74, 0, 0, 0.25);">
                    Login Securely
                </button>
            </form>

            <div id="passcodeLoginSection" style="display: none; margin-top: 25px;">
                <div class="form-group">
                    <label class="form-label" style="text-align: center;">Quick Passcode</label>
                    <input type="password" id="passcode" class="form-input" maxlength="4" placeholder="••••"
                        style="text-align: center; letter-spacing: 12px; font-size: 28px; border-radius: 16px; padding: 12px; border: 1.5px solid var(--accent-gold);">
                </div>
                <button onclick="handlePasscodeLogin()" class="btn-primary-maroon"
                    style="background: var(--accent-gold); border-radius: 16px; padding: 16px;">
                    Login with Passcode
                </button>
            </div>

            <div class="auth-links" style="margin-top: 20px; position: relative; z-index: 3500; pointer-events: auto;">
                <a href="mobile-forgot-password.html">Reset Password</a>
                <a href="mobile-signup.html" style="color: var(--accent-gold);">Create Account</a>
            </div>

            <div style="margin-top: 50px;">
                <div style="background: linear-gradient(135deg, var(--primary-maroon), #8b0000); border-radius: 20px; padding: 25px; text-align: left; color: white; position: relative; overflow: hidden; box-shadow: var(--card-shadow);">
                    <div style="position: relative; z-index: 1;">
                        <h4 style="font-size: 18px; font-weight: 800; margin-bottom: 5px;">Exclusive Rewards</h4>
                        <p style="font-size: 13px; opacity: 0.9; line-height: 1.4;">Earn 10% cashback on your first 5 UPI transactions. T&C Apply.</p>
                    </div>
                    <i class="fas fa-gift" style="position: absolute; bottom: -10px; right: -10px; font-size: 80px; opacity: 0.15;"></i>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item" onclick="alert('Services available after login.')">
                <i class="fas fa-th-large"></i>
                <span class="nav-label">Services</span>
            </a>
            <a href="#" class="nav-item" onclick="alert('Latest offers: 10% cashback on UPI transfers!')">
                <i class="fas fa-percent"></i>
                <span class="nav-label">Offers</span>
            </a>
            <div class="nav-center">
                <div class="nav-center-btn" onclick="alert('Please login to use Scan & Pay.')">
                    <i class="fas fa-qrcode"></i>
                    <span class="nav-label" style="font-size: 8px;">Scan & Pay</span>
                </div>
            </div>
            <a href="#" class="nav-item" onclick="alert('Support: 1800-SB-BANK')">
                <i class="fas fa-headset"></i>
                <span class="nav-label">Help</span>
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-sign-in-alt"></i>
                <span class="nav-label">Login</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="api-config.js"></script>
    <script src="chatbot.js"></script>
    <script src="mobile-logic.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('ServiceWorker registration successful'))
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });
        }
    </script>
</body>

</html>
